<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Produits | Carte Stylisée</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header class="page-header">
    <h1>Nos Produits</h1>
    <p>Découvrez notre sélection stylisée</p>
  </header>

  <main class="products">
    <!-- Smartphone -->
    <div class="product-card">
      <div class="badge">En stock</div>
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&h=300&fit=crop" alt="Smartphone">
      <h3>Smartphone X</h3>
      <p class="description">Écran AMOLED, 128Go, 5G</p>
      <p class="price">450$</p>
      <div class="rating">
        <i class="fa fa-star"></i><i class="fa fa-star"></i>
        <i class="fa fa-star"></i><i class="fa fa-star"></i>
        <i class="fa fa-star-half-alt"></i>
      </div>
      <div class="actions">
        <button class="btn">Ajouter au panier</button>
        <button class="btn btn-secondary">Favoris</button>
      </div>
    </div>

    <!-- Laptop -->
    <div class="product-card">
      <div class="badge promo">Promo</div>
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&h=300&fit=crop" alt="Laptop">
      <h3>Laptop Pro</h3>
      <p class="description">Intel i7, 16Go RAM, SSD 512Go</p>
      <p class="price">899$</p>
      <div class="rating">
        <i class="fa fa-star"></i><i class="fa fa-star"></i>
        <i class="fa fa-star"></i><i class="fa fa-star"></i>
        <i class="fa fa-star"></i>
      </div>
      <div class="actions">
        <button class="btn">Ajouter au panier</button>
        <button class="btn btn-secondary">Favoris</button>
      </div>
    </div>

    <!-- Livre -->
    <div class="product-card">
      <div class="badge">En stock</div>
      <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=400&h=300&fit=crop" alt="Livre">
      <h3>Livre Tech</h3>
      <p class="description">Apprendre le développement web moderne</p>
      <p class="price">25$</p>
      <div class="rating">
        <i class="fa fa-star"></i><i class="fa fa-star"></i>
        <i class="fa fa-star"></i><i class="fa fa-star-half-alt"></i>
        <i class="fa fa-star"></i>
      </div>
      <div class="actions">
        <button class="btn">Ajouter au panier</button>
        <button class="btn btn-secondary">Favoris</button>
      </div>
    </div>
  </main>
</body>
</html>
